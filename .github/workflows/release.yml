name: Release APK

# Two ways to cut a release:
#   1. Auto (Approach A): bump `versionName` in app/build.gradle.kts and push
#      to main. This workflow reads the version, and if tag v<version> does
#      not already exist, builds the release APK and publishes it as a
#      GitHub Release — creating the tag from inside Actions via GITHUB_TOKEN.
#   2. Manual: push a tag matching v* yourself. That path always releases the
#      tagged commit, regardless of the version-bump check.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      should_release: ${{ steps.resolve.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag and whether to release
        id: resolve
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            # Manual tag push: always release the tagged commit.
            TAG="$GITHUB_REF_NAME"
            SHOULD=true
          else
            # main push: release only if this version hasn't been tagged yet.
            VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1 || true)
            if [ -z "$VERSION" ]; then
              echo "Could not parse versionName from app/build.gradle.kts" >&2
              exit 1
            fi
            TAG="v${VERSION}"
            if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
              SHOULD=false
            else
              SHOULD=true
            fi
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "should_release=${SHOULD}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG} should_release=${SHOULD}"

  release:
    needs: decide
    if: needs.decide.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # NOTE: release APKs are signed with the debug keystore so they install
      # without needing repo secrets. For Play Store / production signing,
      # add a real keystore + the standard RELEASE_STORE_FILE / KEY_ALIAS /
      # KEY_PASSWORD / STORE_PASSWORD secrets and swap the signingConfig in
      # app/build.gradle.kts.
      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk "dist/lifegame-${{ needs.decide.outputs.tag }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.decide.outputs.tag }}
          name: ${{ needs.decide.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/lifegame-*.apk

name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      # NOTE: release APKs are signed with the debug keystore so they install
      # without needing repo secrets. For Play Store / production signing,
      # add a real keystore + the standard RELEASE_STORE_FILE / KEY_ALIAS /
      # KEY_PASSWORD / STORE_PASSWORD secrets and swap the signingConfig in
      # app/build.gradle.kts.
      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk "dist/lifegame-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/lifegame-*.apk
